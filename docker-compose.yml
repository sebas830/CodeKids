version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: codekids_db
      POSTGRES_USER: codekids_user
      POSTGRES_PASSWORD: codekids_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codekids_network

  app:
    build: .
    ports:
      - "3000:3000"
    networks:
      - codekids_network

volumes:
  postgres_data:

networks:
  codekids_network: