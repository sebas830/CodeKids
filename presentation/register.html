<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CodeKids</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>CodeKids</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#proposito">Propósito</a></li>
                <li><a href="index.html#beneficios">Beneficios</a></li>
                <li><a href="index.html#como-funciona">Cómo Funciona</a></li>
                <li><a href="index.html#testimonios">Testimonios</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="register" data-animation="fade-in-scale">
            <div class="login-card">
                <h2>Crear Cuenta</h2>
                <form id="register-form">
                    <div class="input-group">
                        <label for="first-name">Nombre</label>
                        <input type="text" id="first-name" placeholder="Tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="last-name">Apellido</label>
                        <input type="text" id="last-name" placeholder="Tu apellido" required>
                    </div>
                    <div class="input-group">
                        <label for="register-email">Correo Electrónico</label>
                        <input type="email" id="register-email" placeholder="tu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" placeholder="Mínimo 8 caracteres" required minlength="8">
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required minlength="8">
                    </div>
                    <div class="input-group">
                        <label for="age">Edad</label>
                        <input type="number" id="age" placeholder="Tu edad" min="6" max="18" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required> Acepto los <a href="#" onclick="alert('Términos próximamente')">términos y condiciones</a>
                        </label>
                    </div>
                    <button type="submit" class="login-btn">Crear Cuenta</button>
                </form>
                <div class="login-footer">
                    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
                    <p><a href="index.html" class="back-link">← Volver al Inicio</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CodeKids. Todos los derechos reservados. | <a href="#">Política de Privacidad</a> | <a href="#">Términos de Servicio</a></p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
