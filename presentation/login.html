<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - CodeKids</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>CodeKids</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#proposito">Propósito</a></li>
                <li><a href="index.html#beneficios">Beneficios</a></li>
                <li><a href="index.html#como-funciona">Cómo Funciona</a></li>
                <li><a href="index.html#testimonios">Testimonios</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="login" data-animation="fade-in-scale">
            <div class="login-card">
                <h2>Iniciar Sesión</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Tu contraseña" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember"> Recordarme
                        </label>
                        <a href="#" onclick="alert('Recuperación próximamente')">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="login-btn">Iniciar Sesión</button>
                </form>
                <div class="login-footer">
                    <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
                    <p><a href="index.html" class="back-link">← Volver al Inicio</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CodeKids. Todos los derechos reservados. | <a href="#">Política de Privacidad</a> | <a href="#">Términos de Servicio</a></p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
